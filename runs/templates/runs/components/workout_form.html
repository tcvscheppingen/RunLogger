<div class="lg:col-span-1">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm h-full">
        <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">Log a New Run</h3>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Km</label>
                    {{ form.distance }}
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-2">Duration (HH:MM:SS)</label>
                <div class="grid grid-cols-3 gap-2">
                    <div class="relative">
                        {{ form.hours }}
                        <span class="absolute right-2 bottom-2 text-[10px] text-slate-400">h</span>
                    </div>
                    <div class="relative">
                        {{ form.minutes }}
                        <span class="absolute right-2 bottom-2 text-[10px] text-slate-400">m</span>
                    </div>
                    <div class="relative">
                        {{ form.seconds }}
                        <span class="absolute right-2 bottom-2 text-[10px] text-slate-400">s</span>
                    </div>
                </div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <div class="flex items-center">
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Intensity (RPE)</label>
                        {% include 'runs/components/info_tooltip.html' with title="Intensity" body=rpe_info %}
                    </div>
                    <span id="rpeValue"
                        class="text-sm font-black text-blue-600 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded border border-blue-100 dark:border-blue-800">5</span>
                </div>
                {{ form.rpe }}
                <div
                    class="flex justify-between text-[10px] font-bold text-slate-400 px-1 mt-1 uppercase tracking-tighter">
                    <span>Easy</span>
                    <span>Moderate</span>
                    <span>Max</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase">Notes</label>
                {{ form.notes }}
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 dark:shadow-none">
                Save Workout
            </button>
        </form>
    </div>
</div>
