<div class="tooltip-container inline-flex items-center ml-1">
    <svg xmlns="http://www.w3.org/2000/svg"
        class="h-3.5 w-3.5 text-slate-300 hover:text-blue-500 dark:hover:text-dracula-purple transition cursor-help" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>

    <span class="tooltip-text shadow-xl border border-dracula-comment">
        <strong class="block border-b border-dracula-comment mb-1 pb-1 text-dracula-purple">{{ title }}</strong>
        {{ body }}
    </span>
</div>

<style>
    /* Tooltip Container */
    .tooltip-container {
        position: relative;
        display: inline-block;
        cursor: help;
    }

    /* Tooltip Text (Hidden by default) */
    .tooltip-text {
        visibility: hidden;
        width: 220px;
        background-color: #282a36;
        /* dracula bg */
        color: #f8f8f2; /* dracula fg */
        text-align: center;
        border-radius: 8px;
        padding: 10px;
        position: absolute;
        z-index: 50;
        bottom: 125%;
        /* Position above the icon */
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
        transition: opacity 0.2s;
        font-size: 0.75rem;
        line-height: 1.25rem;
        font-weight: 400;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* Tooltip Arrow */
    .tooltip-text::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        margin-left: -5px;
        border-width: 5px;
        border-style: solid;
        border-color: #282a36 transparent transparent transparent;
    }

    /* Show on Hover */
    .tooltip-container:hover .tooltip-text {
        visibility: visible;
        opacity: 1;
    }
</style>
