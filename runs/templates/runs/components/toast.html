{% if messages %}
<div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-80">
    {% for message in messages %}
    <div class="toast flex items-start gap-3 px-4 py-3 rounded-lg text-sm font-medium border shadow-lg
        {% if message.tags == 'success' %}bg-green-100 text-green-900 border-green-300 dark:bg-green-900 dark:text-green-100 dark:border-green-700
        {% else %}bg-yellow-100 text-yellow-900 border-yellow-300 dark:bg-yellow-900 dark:text-yellow-100 dark:border-yellow-700{% endif %}">
        <span class="flex-1">{{ message }}</span>
        <button class="toast-close flex-shrink-0 opacity-50 hover:opacity-100 transition-opacity mt-0.5">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
<script>
    document.querySelectorAll('.toast').forEach(function (toast) {
        function dismiss() {
            toast.style.transition = 'opacity 0.3s, transform 0.3s';
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(function () { toast.remove(); }, 300);
        }
        toast.querySelector('.toast-close').addEventListener('click', dismiss);
        setTimeout(dismiss, 5000);
    });
</script>
{% endif %}
