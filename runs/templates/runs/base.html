<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Run Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        // Apply dark mode before page renders to prevent flash of unstyled content
        if (localStorage.theme === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        /* Global styles for Django's auto-generated form fields */
        input[type="text"],
        input[type="number"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        textarea {
            width: 100%;
            border-radius: 0.5rem;
            border: 1px solid #cbd5e1; /* slate-300 */
            padding: 0.5rem 0.75rem;
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #2563eb; /* blue-600 */
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Style for the RPE range slider specifically */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #e2e8f0; /* slate-200 */
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #2563eb; /* blue-600 */
            border-radius: 50%;
            cursor: pointer;
        }

        /* Dark mode form inputs */
        .dark input[type="text"],
        .dark input[type="number"],
        .dark input[type="password"],
        .dark input[type="email"],
        .dark input[type="date"],
        .dark textarea {
            border-color: #475569; /* slate-600 */
            background-color: #1e293b; /* slate-800 */
            color: #f1f5f9; /* slate-100 */
        }

        .dark input:focus, .dark textarea:focus {
            border-color: #3b82f6; /* blue-500 */
            background-color: #1e293b;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .dark input[type="range"] {
            background: #475569; /* slate-600 */
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 font-sans dark:bg-slate-900 dark:text-slate-100 transition-colors">

    <nav class="bg-blue-600 dark:bg-slate-900 p-4 text-white shadow-lg transition-colors">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">
                <a href="{% url 'dashboard' %}">🏃‍♂️ RunLog</a>
            </h1>
            <div class="flex items-center space-x-6">
                {% if user.is_authenticated %}
                <span class="text-blue-100 dark:text-slate-400 text-sm italic">Hi, {{ user.username }}!</span>
                <a href="{% url 'dashboard' %}" class="hover:text-blue-200 dark:hover:text-slate-300 transition">Dashboard</a>

                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="bg-blue-700 hover:bg-blue-800 dark:bg-slate-700 dark:hover:bg-slate-600 px-3 py-1 rounded-md text-sm transition">
                        Logout
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="hover:text-blue-200 dark:hover:text-slate-300 transition">Login</a>
                <a href="{% url 'register' %}"
                    class="bg-white text-blue-600 dark:bg-slate-700 dark:text-white px-3 py-1 rounded-md text-sm font-bold hover:bg-blue-50 dark:hover:bg-slate-600 transition">
                    Sign Up
                </a>
                {% endif %}

                <!-- Dark mode toggle button -->
                <button onclick="toggleDarkMode()" id="darkToggle"
                    class="p-1.5 rounded-lg text-blue-100 hover:text-white hover:bg-blue-700 dark:hover:bg-slate-700 transition"
                    title="Toggle dark mode" aria-label="Toggle dark mode">
                    <!-- Moon icon (shown in light mode) -->
                    <svg id="moonIcon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                    <!-- Sun icon (shown in dark mode) -->
                    <svg id="sunIcon" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        {% block content %}
        {% endblock %}
    </main>

    <script>
        function updateToggleIcon() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
            updateToggleIcon();
        }

        // Set correct icon on page load
        updateToggleIcon();
    </script>

</body>

</html>
